# ============================================================
# Odoo + PostgreSQL — AI Employee Vault
# ============================================================
# Usage:
#   cd setup/odoo
#   docker compose up -d
#
# Odoo UI: http://localhost:8069
# Stop:    docker compose down
# Destroy: docker compose down -v   (removes all data)
# ============================================================

version: "3.8"

services:

  # ----------------------------------------------------------
  # PostgreSQL database
  # ----------------------------------------------------------
  db:
    image: postgres:15
    container_name: odoo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       postgres
      POSTGRES_USER:     odoo
      POSTGRES_PASSWORD: odoo_password
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    networks:
      - odoo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Odoo Community Edition
  # ----------------------------------------------------------
  odoo:
    image: odoo:17
    container_name: odoo_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      HOST:     db
      PORT:     5432
      USER:     odoo
      PASSWORD: odoo_password
    volumes:
      - odoo_web_data:/var/lib/odoo

    networks:
      - odoo_net

# ----------------------------------------------------------
# Named volumes (persistent across restarts)
# ----------------------------------------------------------
volumes:
  odoo_db_data:
  odoo_web_data:

# ----------------------------------------------------------
# Internal network
# ----------------------------------------------------------
networks:
  odoo_net:
    driver: bridge
